<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Ecole 221</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        :root {
            --blue:       #1976D2;
            --blue-dark:  #1565C0;
            --blue-light: #E3F2FD;
            --red:        #dc3545;
            --white:      #ffffff;
            --gray-100:   #f8fafc;
            --gray-300:   #dde1e7;
            --gray-500:   #6b7280;
            --gray-800:   #1f2937;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--blue-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -120px; right: -120px;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(25,118,210,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px; left: -80px;
            width: 350px; height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(25,118,210,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--white);
            border-radius: 20px;
            padding: 48px 40px 40px;
            box-shadow: 0 8px 40px rgba(25,118,210,0.12);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo {
            width: 56px; height: 56px;
            border-radius: 14px;
            background: var(--blue);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .login-logo svg {
            width: 28px; height: 28px; fill: white;
        }

        .login-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.75rem;
            color: var(--gray-800);
            line-height: 1.2;
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--gray-500);
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--gray-800);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-500);
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px 11px 42px;
            border: 1.5px solid var(--gray-300);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--gray-800);
            background: var(--gray-100);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(25,118,210,0.1);
        }

        .form-group input.error {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(220,53,69,0.1);
        }

        .error-text {
            font-size: 0.75rem;
            color: var(--red);
            margin-top: 5px;
            display: none;
        }

        .error-text.visible {
            display: block;
        }

        /* Toggle password */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-500);
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .toggle-password:hover { color: var(--blue); }

        /* Alert */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
        .alert.visible { display: block; }
        .alert.error {
            background: #fce4ec;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover { background: var(--blue-dark); }
        .btn-login:active { transform: scale(0.99); }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-login .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.78rem;
            color: var(--gray-500);
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-logo">
                    <!-- School cap icon -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3L1 9l4 2.18V15c0 1.66 3.13 3 7 3s7-1.34 7-3v-3.82L23 9 12 3zm6 10c0 .5-2.13 1.5-6 1.5S6 13.5 6 13v-2.73l6 3.28 6-3.28V13zM12 12.72L3.26 8.5 12 4.28l8.74 4.22L12 12.72z"/>
                    </svg>
                </div>
                <h1 class="login-title">Ecole 221</h1>
                <p class="login-subtitle">Connectez-vous pour accéder au portail</p>
            </div>

            <div id="loginAlert" class="alert error"></div>

            <div class="form-group">
                <label for="loginEmail">Adresse email</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </span>
                    <input type="email" id="loginEmail" placeholder="exemple@ecole221.sn" autocomplete="email">
                </div>
                <span class="error-text" id="error-email"></span>
            </div>

            <div class="form-group">
                <label for="loginPassword">Mot de passe</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePwd" title="Afficher/Masquer">
                        <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <span class="error-text" id="error-password"></span>
            </div>

            <button class="btn-login" id="btnLogin">
                <span class="btn-text">Se connecter</span>
                <div class="spinner"></div>
            </button>

            <p class="login-footer">© 2025 Ecole 221 — Accès réservé au personnel autorisé</p>
        </div>
    </div>

    <script type="module">
        import { login, isLoggedIn } from './js/auth/authService.js';

        // Redirect si déjà connecté
        if (isLoggedIn()) {
            window.location.href = 'index.html';
        }

        const emailInput    = document.getElementById('loginEmail');
        const passwordInput = document.getElementById('loginPassword');
        const btnLogin      = document.getElementById('btnLogin');
        const loginAlert    = document.getElementById('loginAlert');
        const togglePwd     = document.getElementById('togglePwd');
        const eyeIcon       = document.getElementById('eyeIcon');

        // Toggle mot de passe
        togglePwd.addEventListener('click', () => {
            const isText = passwordInput.type === 'text';
            passwordInput.type = isText ? 'password' : 'text';
            eyeIcon.innerHTML = isText
                ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
                : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
        });

        function showAlert(msg) {
            loginAlert.textContent = msg;
            loginAlert.classList.add('visible');
        }

        function clearErrors() {
            loginAlert.classList.remove('visible');
            document.querySelectorAll('.error-text').forEach(el => {
                el.textContent = '';
                el.classList.remove('visible');
            });
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');
        }

        function showFieldError(id, msg) {
            const el = document.getElementById('error-' + id);
            const input = document.getElementById('login' + id.charAt(0).toUpperCase() + id.slice(1));
            el.textContent = msg;
            el.classList.add('visible');
            if (input) input.classList.add('error');
        }

        btnLogin.addEventListener('click', async () => {
            clearErrors();

            const email    = emailInput.value.trim();
            const password = passwordInput.value.trim();

            let valid = true;
            if (!email) { showFieldError('email', "L'email est obligatoire"); valid = false; }
            if (!password) { showFieldError('password', 'Le mot de passe est obligatoire'); valid = false; }
            if (!valid) return;

            btnLogin.classList.add('loading');
            btnLogin.disabled = true;

            const result = await login(email, password);

            btnLogin.classList.remove('loading');
            btnLogin.disabled = false;

            if (result.success) {
                window.location.href = 'index.html';
            } else {
                showAlert(result.message);
            }
        });

        // Enter key
        [emailInput, passwordInput].forEach(el => {
            el.addEventListener('keydown', e => {
                if (e.key === 'Enter') btnLogin.click();
            });
        });
    </script>
</body>
</html>
