<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecole 221</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="main-container">
        <!-- Premier div : 1/4 de la page - Formulaire -->
        <div class="form-section">
            <h2 class="form-title">Formulaire Ecole 221</h2>
            <form id="studentForm">
                <!-- Message global -->
                <div id="globalMessage" class="global-message"></div>

                <div class="form-group">
                    <label>Prenom</label>
                    <input type="text" id="prenom" name="prenom" placeholder="Prenom">
                    <span class="error-message" id="error-prenom"></span>
                </div>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="nom" name="nom" placeholder="Nom">
                    <span class="error-message" id="error-nom"></span>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" name="role">
                        <option value="">Selectionnez un role</option>
                        <option value="Etudiant">Etudiant</option>
                        <option value="Professeur">Professeur</option>
                        <option value="Administrateur">Administrateur</option>
                        <option value="Personnel">Personnel</option>
                        <option value="Visiteur">Visiteur</option>
                    </select>
                    <span class="error-message" id="error-role"></span>
                </div>
                <div class="form-group">
                    <label>Telephone</label>
                    <input type="tel" id="telephone" name="telephone" placeholder="Telephone">
                    <span class="error-message" id="error-telephone"></span>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="mail" name="email" placeholder="Email">
                    <span class="error-message" id="error-mail"></span>
                </div>
                <button type="submit" class="btn-add">Ajouter</button>
            </form>
        </div>

        <!-- Deuxieme div : reste de la page -->
        <div class="content-section">
            <!-- Stats et controls -->
            <div class="stats-bar">
                <div class="stats">
                    <span class="stats-label">Nombre d'enregistrements :</span>
                    <span class="stats-number" id="studentCount">0</span>
                </div>
                <div class="controls">
                    <input type="search" id="searchInput" class="search-input" placeholder="Rechercher...">
                    <button id="deleteAllBtn" class="btn-delete-all">Tout supprimer</button>
                    <!-- Bouton déconnexion -->
                    <button id="logoutBtn" class="btn-logout">Déconnexion</button>
                </div>
            </div>

            <!-- Cards container -->
            <div class="cards-container" id="cardsContainer">

            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
